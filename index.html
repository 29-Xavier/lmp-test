        // 渲染题目
        function renderQ(){
            let q = questionList[currentQ];
            document.getElementById('qNum').innerText = `第 ${currentQ+1} 题 / 共 ${totalQ} 题`;
            document.getElementById('qTitle').innerText = q.title;
            // 进度条
            let per = ((currentQ+1)/totalQ)*100;
            document.getElementById('progressBar').style.width = per + "%";
            // 渲染选项
            let box = document.getElementById('optionsBox');
            box.innerHTML = "";
            q.opt.forEach((item,idx)=>{
                let btn = document.createElement("button");
                btn.className = "option";
                btn.innerText = item;
                if(userAnswer[currentQ] === idx) btn.classList.add("active");
                btn.onclick = function(){
                    selectOpt(idx);
                }
                box.appendChild(btn);
            });
        }

        // 选择选项
        function selectOpt(idx){
            userAnswer[currentQ] = idx;
            renderQ();
            saveCache();
        }

        // 上一题
        function prevQ(){
            if(currentQ > 0){
                currentQ--;
                renderQ();
                saveCache();
            }
        }
        // 下一题 / 交卷
        function nextQ(){
            if(userAnswer[currentQ] === undefined){
                alert("请先选择一个选项哦~");
                return;
            }
            // 【修复计分逻辑】
            let q = questionList[currentQ];
            if(q.dim !== "none"){
                let val = [2,1,0,-1,-2][userAnswer[currentQ]];
                switch(q.dim){
                    case "EI":
                        score[0] += val;
                        score[1] -= val;
                        break;
                    case "OV":
                        score[2] += val;
                        score[3] -= val;
                        break;
                    case "AL":
                        score[4] += val;
                        score[5] -= val;
                        break;
                    case "ND":
                        score[6] += val;
                        score[7] -= val;
                        break;
                }
            }
            saveCache();

            if(currentQ < questionList.length-1){
                currentQ++;
                renderQ();
            }else{
                // 答完所有题，进入loading
                goLoad();
                setTimeout(calcResult,1800);
            }
        }

        // 计算最终人格
        function calcResult(){
            // 判断四维度倾向
            let E = score[0] > score[1] ? "I":"E";
            let O = score[2] > score[3] ? "V":"O";
            let A = score[4] > score[5] ? "L":"A";
            let N = score[6] > score[7] ? "D":"N";
            let finalCode = E+O+A+N;
            let res = personalityMap[finalCode];

            // 渲染结果页
            document.getElementById('resCode').innerText = finalCode;
            document.getElementById('resNick').innerText = res.nick;
            document.getElementById('resImg').src = res.img;
            document.getElementById('resDesc').innerText = res.desc;

            // 【修复雷达图重复绘制】
            const canvasDom = document.getElementById('radarChart');
            if(radarChartIns){
                radarChartIns.destroy();
            }
            const ctx = canvasDom.getContext('2d');
            radarChartIns = new Chart(ctx,{
                type:'radar',
                data:{
                    labels:['追物料(E)','爱脑补(I)','爱产出(O)','纯吃粮(V)','敢发声(A)','圈地自萌(L)','宿命感(N)','日常甜(D)'],
                    datasets:[{
                        label:'你的属性分值',
                        data:score,
                        backgroundColor:'rgba(132,169,255,0.3)',
                        borderColor:'#ffb3d9',
                        pointBackgroundColor:'#7a67ee'
                    }]
                },
                options:{scales:{r:{min:-10,max:10}}}
            });
            goRes();
        }
